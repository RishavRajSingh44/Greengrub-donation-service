version: "3.8"

services:

  postgres:
    image: postgres:15
    container_name: greengrub-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: greengrub
    ports:
      - "5432:5432"
    networks:
      - microservice-net

  adminer:
    image: adminer
    container_name: greengrub-adminer
    ports:
      - "8088:8080"
    networks:
      - microservice-net

  mongodb:
    image: mongo:7
    container_name: greengrub-mongo
    ports:
      - "27017:27017"
    networks:
      - microservice-net

  mongo-express:
    image: mongo-express
    container_name: greengrub-mongo-ui
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb
    ports:
      - "8089:8081"
    networks:
      - microservice-net

  kafka:
    image: apache/kafka:latest
    container_name: greengrub-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - microservice-net

  kafka-ui:
    image: provectuslabs/kafka-ui
    container_name: greengrub-kafka-ui
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: greengrub
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    networks:
      - microservice-net

  maildev:
    image: maildev/maildev
    container_name: greengrub-maildev
    ports:
      - "1080:1080"
      - "1025:1025"
    networks:
      - microservice-net


networks:
  microservice-net:
    driver: bridge
syntax = "proto3";

package greengrub.donation;

option java_multiple_files = true;
option java_package = "com.greengrub.donationService.grpc";
option java_outer_classname = "DonationServiceProto";

// ============================================================
//  DONATION SERVICE  (port 8083)
//  Consumed by: API Gateway (8080), Notification Service (8084)
// ============================================================

service DonationService {
  rpc CreateDonation  (CreateDonationRequest) returns (DonationResponse);
  rpc GetAllDonations (Empty)                 returns (DonationListResponse);
  rpc GetDonationById (DonationByIdRequest)   returns (DonationResponse);
  rpc UpdateDonation  (UpdateDonationRequest) returns (DonationResponse);
  rpc DeleteDonation  (DonationByIdRequest)   returns (DeleteDonationResponse);
}

// ============================================================
//  ENUMS
// ============================================================

enum DonationStatus {
  ACTIVE    = 0;
  CLAIMED   = 1;
  CANCELLED = 2;
}

// ============================================================
//  SHARED MESSAGES
// ============================================================

message Empty {}

message UserDetail {
  string first_name    = 1;
  string last_name     = 2;
  string phone_number  = 3;
  string email_address = 4;
}

// ============================================================
//  REQUEST MESSAGES
// ============================================================

message CreateDonationRequest {
  string         donation_name = 1;
  UserDetail     user_detail   = 2;
  DonationStatus status        = 3;
}

message DonationByIdRequest {
  int64 id = 1;
}

message UpdateDonationRequest {
  int64          id            = 1;
  string         donation_name = 2;
  UserDetail     user_detail   = 3;
  DonationStatus status        = 4;
}

// ============================================================
//  RESPONSE MESSAGES
// ============================================================

message DonationResponse {
  int64          id            = 1;
  string         donation_name = 2;
  UserDetail     user_detail   = 3;
  DonationStatus status        = 4;
  string         creation_date = 5;
  string         update_date   = 6;
}

message DonationListResponse {
  repeated DonationResponse donations = 1;
}

message DeleteDonationResponse {
  string message = 1;
}
